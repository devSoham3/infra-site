services:
  nginx:
    image: nginx:latest
    container_name: nginx-reverse-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro"
      - "/etc/ssl/cloudflare:/etc/ssl/cloudflare:ro"
    extra_hosts:
      - "host-gateway:host-gateway"
