# ---------------------------------------------------------------------------
# Block all direct HTTP and unmatched HTTPS access
# ---------------------------------------------------------------------------
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/ssl/cloudflare/sohamdeo.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/sohamdeo.com.key;

    return 444;
}
